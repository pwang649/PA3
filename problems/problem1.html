    <title>CPSC 487/587</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19.1/dist/lil-gui.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/10.3.0/math.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quaternion@1.5.1/quaternion.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/numeric@1.2.6/numeric-1.2.6.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stats.js@0.17.0/build/stats.min.js"></script>
    <script type="importmap">
        {
            "imports": {
              "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
              "three/": "https://unpkg.com/three@0.160.0/"

    </script>
</head>
<body>
<script type="module">
    import { ThreeEngine, get_default_lil_gui, refresh_displays } from "../js/utils/utils_three.js";
    import {
        mul_matrix_matrix,
        transpose,
        add_matrix_matrix,
        sub_matrix_matrix,
        mul_matrix_scalar,
        identity_matrix,
    } from "../js/utils/utils_math.js";

    // todo: create a visualization that demonstrates your knowledge of displacement-based
    // todo: distance over SE(3).  Note that this will use your logarithm solution from PS_U3,
    // todo: so you must finish that prior to starting this problem.
    // todo: Feel free to make this visualization as creative as you want, or, conversely,
    // todo: feel free to create a visualization like the one here
    // todo: https://yale-cpsc-487-587-internal-djrakita-c95fa6c3239a481a48d29a6b0fd.gitlab.io/html/visualizations/SE2_distance2.html
    // todo: though applied to 3D rotations + translations instead of 2D rotations + translations.
    // todo: Feel free to use the 3x3 matrix inverse function provided by me below if you want.

    // A must be a 3x3 matrix in row major order
    // [[a11, a12, a13], [a21, a22, a23], [a31, a32, a33]]
    function matrix_inverse_3x3(A) {
        const det =
            A[0][0] * (A[1][1] * A[2][2] - A[2][1] * A[1][2]) -
            A[0][1] * (A[1][0] * A[2][2] - A[1][2] * A[2][0]) +
            A[0][2] * (A[1][0] * A[2][1] - A[1][1] * A[2][0]);

        if (det === 0) {
            return null;
        }

        const cofactors = [
            [
                A[1][1] * A[2][2] - A[2][1] * A[1][2],
                -(A[1][0] * A[2][2] - A[1][2] * A[2][0]),
                A[1][0] * A[2][1] - A[2][0] * A[1][1],
            ],
            [
                -(A[0][1] * A[2][2] - A[0][2] * A[2][1]),
                A[0][0] * A[2][2] - A[0][2] * A[2][0],
                -(A[0][0] * A[2][1] - A[2][0] * A[0][1]),
            ],
            [
                A[0][1] * A[1][2] - A[0][2] * A[1][1],
                -(A[0][0] * A[1][2] - A[1][0] * A[0][2]),
                A[0][0] * A[1][1] - A[1][0] * A[0][1],
            ],
        ];

        return [
            [cofactors[0][0] / det, cofactors[1][0] / det, cofactors[2][0] / det],
            [cofactors[0][1] / det, cofactors[1][1] / det, cofactors[2][1] / det],
            [cofactors[0][2] / det, cofactors[1][2] / det, cofactors[2][2] / det],
        ];
    }

    function trace_3x3(M) {
        return M[0][0] + M[1][1] + M[2][2];
    }

    function rot_x(a) {
        const c = Math.cos(a),
            s = Math.sin(a);
        return [
            [1, 0, 0],
            [0, c, -s],
            [0, s, c],
        ];
    }

    function rot_y(a) {
        const c = Math.cos(a),
            s = Math.sin(a);
        return [
            [c, 0, s],
            [0, 1, 0],
            [-s, 0, c],
        ];
    }

    function rot_z(a) {
        const c = Math.cos(a),
            s = Math.sin(a);
        return [
            [c, -s, 0],
            [s, c, 0],
            [0, 0, 1],
        ];
    }

    /** R = Rz(yaw) Ry(pitch) Rx(roll) — different convention from a single Z-Y-X Euler matrix baked as one formula. */
    function rigid_rotation_ypr(yaw, pitch, roll) {
        const Rz = rot_z(yaw);
        const Ry = rot_y(pitch);
        const Rx = rot_x(roll);
        return mul_matrix_matrix(Rz, mul_matrix_matrix(Ry, Rx));
    }

    function make_SE3_from_ypr(yaw, pitch, roll, tx, ty, tz) {
        const R = rigid_rotation_ypr(yaw, pitch, roll);
        return [
            [R[0][0], R[0][1], R[0][2], tx],
            [R[1][0], R[1][1], R[1][2], ty],
            [R[2][0], R[2][1], R[2][2], tz],
            [0, 0, 0, 1],
        ];
    }

    function hat_so3(w) {
        const wx = w[0][0],
            wy = w[1][0],
            wz = w[2][0];
        return [
            [0, -wz, wy],
            [wz, 0, -wx],
            [-wy, wx, 0],
        ];
    }

    /** SO(3) logarithm as skew matrix [log R], with stable small-angle and pi handling. */
    function so3_log_skew(R) {
        const tr = trace_3x3(R);
        const cos_beta = Math.min(1, Math.max(-1, 0.5 * (tr - 1)));
        const beta = Math.acos(cos_beta);

        if (beta < 1e-6) {
            return mul_matrix_scalar(sub_matrix_matrix(R, transpose(R)), 0.5);
        }

        if (Math.PI - beta < 1e-5) {
            const IpR = add_matrix_matrix(R, identity_matrix(3));
            let bestCol = 0;
            let bestLen = -1;
            for (let j = 0; j < 3; j++) {
                const len = IpR[0][j] ** 2 + IpR[1][j] ** 2 + IpR[2][j] ** 2;
                if (len > bestLen) {
                    bestLen = len;
                    bestCol = j;
                }
            }
            const ax = IpR[0][bestCol];
            const ay = IpR[1][bestCol];
            const az = IpR[2][bestCol];
            const nlen = Math.sqrt(ax * ax + ay * ay + az * az);
            const nx = ax / nlen;
            const ny = ay / nlen;
            const nz = az / nlen;
            return mul_matrix_scalar(
                hat_so3([[nx], [ny], [nz]]),
                Math.PI,
            );
        }

        const s = beta / (2 * Math.sin(beta));
        return mul_matrix_scalar(sub_matrix_matrix(R, transpose(R)), s);
    }

    /** SE(3) logarithm (4x4 with zero bottom row): rotation block is so(3), translation column solves J_l^{-1} t. */
    function se3_log_hat(R, t_col) {
        const A = so3_log_skew(R);
        const u = [[A[2][1]], [A[0][2]], [A[1][0]]];
        const beta = Math.sqrt(u[0][0] ** 2 + u[1][0] ** 2 + u[2][0] ** 2);

        let q;
        let r;
        if (beta < 1e-6) {
            q = 0.5 - beta ** 2 / 24 + beta ** 4 / 720;
            r = 1 / 6 - beta ** 2 / 120 + beta ** 4 / 5040;
        } else {
            q = (1 - Math.cos(beta)) / (beta ** 2);
            r = (beta - Math.sin(beta)) / (beta ** 3);
        }

        const I = identity_matrix(3);
        const J = add_matrix_matrix(I, add_matrix_matrix(mul_matrix_scalar(A, q), mul_matrix_scalar(mul_matrix_matrix(A, A), r)));
        const Jinv = matrix_inverse_3x3(J);
        const b = mul_matrix_matrix(Jinv, t_col);

        return [
            [A[0][0], A[0][1], A[0][2], b[0][0]],
            [A[1][0], A[1][1], A[1][2], b[1][0]],
            [A[2][0], A[2][1], A[2][2], b[2][0]],
            [0, 0, 0, 0],
        ];
    }

    function se3_inverse(T) {
        const R = [
            [T[0][0], T[0][1], T[0][2]],
            [T[1][0], T[1][1], T[1][2]],
            [T[2][0], T[2][1], T[2][2]],
        ];
        const Rt = transpose(R);
        const neg_t = [[-T[0][3]], [-T[1][3]], [-T[2][3]]];
        const t_inv = mul_matrix_matrix(Rt, neg_t);
        return [
            [Rt[0][0], Rt[0][1], Rt[0][2], t_inv[0][0]],
            [Rt[1][0], Rt[1][1], Rt[1][2], t_inv[1][0]],
            [Rt[2][0], Rt[2][1], Rt[2][2], t_inv[2][0]],
            [0, 0, 0, 1],
        ];
    }

    function twist_se3_norm(xi) {
        const w =
            xi[2][1] ** 2 + xi[0][2] ** 2 + xi[1][0] ** 2 + xi[0][3] ** 2 + xi[1][3] ** 2 + xi[2][3] ** 2;
        return Math.sqrt(w);
    }

    function transform_point(T, p) {
        const r = mul_matrix_matrix(T, [[p[0]], [p[1]], [p[2]], [1]]);
        return [r[0][0], r[1][0], r[2][0]];
    }

    const engine = ThreeEngine.new_default_3d();

    const settings = {
        yaw_a: 0,
        pitch_a: 0,
        roll_a: 0,
        ax: 0,
        ay: 0,
        az: 0,
        yaw_b: 0,
        pitch_b: 0,
        roll_b: 0,
        bx: 0,
        by: 0,
        bz: 0,
        displacement_distance: "0",
    };

    const gui = get_default_lil_gui();

    const folderA = gui.addFolder("Frame A (yaw, pitch, roll)");
    folderA.add(settings, "yaw_a", -6.28, 6.28).name("yaw (Rz)");
    folderA.add(settings, "pitch_a", -6.28, 6.28).name("pitch (Ry)");
    folderA.add(settings, "roll_a", -6.28, 6.28).name("roll (Rx)");
    folderA.add(settings, "ax", -2, 2).name("tx");
    folderA.add(settings, "ay", -2, 2).name("ty");
    folderA.add(settings, "az", -2, 2).name("tz");
    folderA.add(
        {
            reset() {
                settings.yaw_a = settings.pitch_a = settings.roll_a = 0;
                settings.ax = settings.ay = settings.az = 0;
                refresh_displays(gui);
            },
        },
        "reset",
    );

    const folderB = gui.addFolder("Frame B");
    folderB.add(settings, "yaw_b", -6.28, 6.28).name("yaw (Rz)");
    folderB.add(settings, "pitch_b", -6.28, 6.28).name("pitch (Ry)");
    folderB.add(settings, "roll_b", -6.28, 6.28).name("roll (Rx)");
    folderB.add(settings, "bx", -2, 2).name("tx");
    folderB.add(settings, "by", -2, 2).name("ty");
    folderB.add(settings, "bz", -2, 2).name("tz");
    folderB.add(
        {
            reset() {
                settings.yaw_b = settings.pitch_b = settings.roll_b = 0;
                settings.bx = settings.by = settings.bz = 0;
                refresh_displays(gui);
            },
        },
        "reset",
    );

    gui.add(settings, "displacement_distance").name("‖log(g₁⁻¹g₂)‖").disable();

    const axis_colors = [0x2e86ab, 0xa23b72, 0xf18f01];
    const axis_vecs = [
        [1, 0, 0],
        [0, 1, 0],
        [0, 0, 1],
    ];

    engine.animation_loop(function () {
        const g_a = make_SE3_from_ypr(settings.yaw_a, settings.pitch_a, settings.roll_a, settings.ax, settings.ay, settings.az);
        const g_b = make_SE3_from_ypr(settings.yaw_b, settings.pitch_b, settings.roll_b, settings.bx, settings.by, settings.bz);

        const o_a = [settings.ax, settings.ay, settings.az];
        const o_b = [settings.bx, settings.by, settings.bz];

        for (let i = 0; i < 3; i++) {
            const pa = transform_point(g_a, axis_vecs[i]);
            const pb = transform_point(g_b, axis_vecs[i]);
            engine.draw_debug_vector(o_a, pa, 0.035, undefined, axis_colors[i]);
            engine.draw_debug_vector(o_b, pb, 0.035, undefined, axis_colors[i]);
        }

        const g_rel = mul_matrix_matrix(se3_inverse(g_a), g_b);
        const Rr = [
            [g_rel[0][0], g_rel[0][1], g_rel[0][2]],
            [g_rel[1][0], g_rel[1][1], g_rel[1][2]],
            [g_rel[2][0], g_rel[2][1], g_rel[2][2]],
        ];
        const tr = [[g_rel[0][3]], [g_rel[1][3]], [g_rel[2][3]]];
        const xi = se3_log_hat(Rr, tr);
        settings.displacement_distance = twist_se3_norm(xi).toFixed(6);

        refresh_displays(gui);
    });
</script>
</body>
